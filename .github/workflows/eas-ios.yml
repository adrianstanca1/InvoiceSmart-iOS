name: Build iOS with EAS

on:
  # Disabled: EAS free plan exhausted until June 1, 2026 (same constraint as cortexbuildpro).
  # Re-enable by uncommenting once the plan resets or a paid plan is configured.
  # push:
  #   branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm install -g eas-cli@latest
      - run: eas build --platform ios --profile preview --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
