name: Xcode iOS Build and Submit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 40
    env:
      ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
      ASC_KEY_ID: S7PSXPJ963
      ASC_ISSUER_ID: 4e694aa4-8cbc-4de4-bdf2-0ace72694564
      DEVELOPMENT_TEAM: 4G3G5MX9BH
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm install -g eas-cli@latest

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --non-interactive

      - name: Disable RNS_GAMMA_ENABLED (fix Xcode 16 build)
        run: |
          sed -i '' "s/||= '1'/||= '0'/" ios/Podfile
          grep -n 'RNS_GAMMA_ENABLED' ios/Podfile

      - name: Pod Install
        run: cd ios && pod install

      - name: Setup Apple API Key
        run: |
          mkdir -p ~/.config/apple
          echo "$ASC_PRIVATE_KEY" > ~/.config/apple/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.config/apple/AuthKey_${ASC_KEY_ID}.p8

      - name: Setup Signing Secrets (manual signing)
        run: |
          # Decode distribution certificate (P12)
          if [ -n "${{ secrets.IOS_DISTRIBUTION_P12 }}" ]; then
            echo "${{ secrets.IOS_DISTRIBUTION_P12 }}" | base64 -d > /tmp/ios_distribution.p12
            # Create keychain and import cert
            security create-keychain -p "invoicesmart" ~/Library/Keychains/build.keychain
            security set-keychain-settings -lut 21600 ~/Library/Keychains/build.keychain
            security unlock-keychain -p "invoicesmart" ~/Library/Keychains/build.keychain
            security import /tmp/ios_distribution.p12 -P "${{ secrets.IOS_P12_PASSWORD }}" -k ~/Library/Keychains/build.keychain -T /usr/bin/codesign -T /usr/bin/security
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "invoicesmart" ~/Library/Keychains/build.keychain
            security list-keychains -s ~/Library/Keychains/build.keychain
          else
            echo "⚠️ IOS_DISTRIBUTION_P12 secret is empty — will try automatic signing"
          fi
          
          # Decode provisioning profile
          if [ -n "${{ secrets.IOS_PROVISIONING_PROFILE }}" ]; then
            echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 -d > /tmp/ios.mobileprovision
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp /tmp/ios.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
            ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          else
            echo "⚠️ IOS_PROVISIONING_PROFILE secret is empty — will try automatic signing"
          fi

      - name: Build Unsigned Archive (compile check)
        run: |
          xcodebuild -workspace ios/InvoiceSmart.xcworkspace \
            -scheme InvoiceSmart \
            -sdk iphoneos \
            -configuration Release \
            archive \
            -archivePath build/InvoiceSmart.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO

      - name: Export Signed IPA (manual signing)
        run: |
          BUNDLE_ID="com.cortexbuildpro.invoicesmart"
          
          if [ -n "${{ secrets.IOS_PROVISIONING_PROFILE }}" ] && [ -n "${{ secrets.IOS_DISTRIBUTION_P12 }}" ]; then
            echo "Using MANUAL signing with provisioning profile"
            cat > ExportOptions.plist << 'PLIST'
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>method</key><string>app-store-connect</string>
              <key>signingStyle</key><string>manual</string>
              <key>teamID</key><string>4G3G5MX9BH</string>
              <key>thinning</key><string>&lt;none&gt;</string>
              <key>compileBitcode</key><false/>
              <key>uploadBitcode</key><false/>
              <key>uploadSymbols</key><true/>
              <key>manageAppVersionAndBuildNumber</key><false/>
              <key>provisioningProfiles</key>
              <dict>
                <key>com.cortexbuildpro.invoicesmart</key><string>InvoiceSmart App Store</string>
              </dict>
            </dict>
            </plist>
            PLIST
          else
            echo "Using AUTOMATIC signing (secrets missing — will fail if app record doesn't exist)"
            cat > ExportOptions.plist << 'PLIST'
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>method</key><string>app-store-connect</string>
              <key>signingStyle</key><string>automatic</string>
              <key>teamID</key><string>4G3G5MX9BH</string>
              <key>thinning</key><string>&lt;none&gt;</string>
              <key>compileBitcode</key><false/>
              <key>uploadBitcode</key><false/>
              <key>uploadSymbols</key><true/>
              <key>manageAppVersionAndBuildNumber</key><false/>
            </dict>
            </plist>
            PLIST
          fi

          xcodebuild -exportArchive \
            -archivePath build/InvoiceSmart.xcarchive \
            -exportPath build/Exported \
            -exportOptionsPlist ExportOptions.plist \
            -authenticationKeyPath "$HOME/.config/apple/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "${ASC_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_ISSUER_ID}" \
            -allowProvisioningUpdates || \
          echo "⚠️ Export failed — likely missing signing cert/profile. See logs above."

      - name: Find IPA
        run: |
          ls -la build/Exported/ 2>/dev/null || true
          find build/Exported -name "*.ipa" 2>/dev/null || echo "No IPA found"

      - name: Upload to TestFlight
        if: ${{ hashFiles('build/Exported/*.ipa') != '' }}
        run: |
          IPA=$(ls build/Exported/*.ipa | head -1)
          echo "Uploading $IPA to TestFlight..."
          xcrun altool --validate-app \
            --type ios \
            --file "$IPA" \
            --apiKey "${ASC_KEY_ID}" \
            --apiIssuer "${ASC_ISSUER_ID}" || true
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "${ASC_KEY_ID}" \
            --apiIssuer "${ASC_ISSUER_ID}" || true

      - name: Upload Artifact
        if: ${{ hashFiles('build/Exported/*.ipa') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: InvoiceSmart-IPA
          path: build/Exported/*.ipa
