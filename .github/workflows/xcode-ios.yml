name: Xcode iOS Build and Submit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 40
    env:
      ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
      ASC_KEY_ID: S7PSXPJ963
      ASC_ISSUER_ID: 4e694aa4-8cbc-4de4-bdf2-0ace72694564
      DEVELOPMENT_TEAM: 4G3G5MX9BH
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm install -g eas-cli@latest

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --non-interactive

      - name: Pod Install
        run: cd ios && pod install

      - name: Setup Apple API Key
        run: |
          mkdir -p ~/.config/apple
          echo "$ASC_PRIVATE_KEY" > ~/.config/apple/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.config/apple/AuthKey_${ASC_KEY_ID}.p8

      - name: Build Unsigned Archive (compile check)
        run: |
          xcodebuild -workspace ios/InvoiceSmart.xcworkspace \
            -scheme InvoiceSmart \
            -sdk iphoneos \
            -configuration Release \
            archive \
            -archivePath build/InvoiceSmart.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export Signed IPA
        run: |
          cat > ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>4G3G5MX9BH</string>
            <key>thinning</key><string>&lt;none&gt;</string>
            <key>compileBitcode</key><false/>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
            <key>manageAppVersionAndBuildNumber</key><false/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/InvoiceSmart.xcarchive \
            -exportPath build/Exported \
            -exportOptionsPlist ExportOptions.plist \
            -authenticationKeyPath "$HOME/.config/apple/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "${ASC_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_ISSUER_ID}" \
            -allowProvisioningUpdates

      - name: Find IPA
        run: ls -la build/Exported/ && find build/Exported -name "*.ipa"

      - name: Upload to TestFlight
        run: |
          # Try altool with API key first
          xcrun altool --validate-app \
            --type ios \
            --file "build/Exported/$(ls build/Exported/*.ipa | head -1)" \
            --apiKey "${ASC_KEY_ID}" \
            --apiIssuer "${ASC_ISSUER_ID}" || true
          xcrun altool --upload-app \
            --type ios \
            --file "build/Exported/$(ls build/Exported/*.ipa | head -1)" \
            --apiKey "${ASC_KEY_ID}" \
            --apiIssuer "${ASC_ISSUER_ID}" || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: InvoiceSmart-IPA
          path: build/Exported/*.ipa
